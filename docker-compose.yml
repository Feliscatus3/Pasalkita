services:
  postgres-pragmatic:
    container_name: postgres-pragmatic
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pragmatic-papers
    ports:
      - "9000:5432"
    volumes:
      - pragmatic_papers_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pragmatic-papers"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pragmatic_papers_postgres_data:
    name: pragmatic_papers_postgres_data
